; PHP configuration for shared hosting (PHP-FPM / CGI)
; This file ensures PHP processes .php files correctly.
; If your host uses a different PHP version path, contact them.

display_errors = Off
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60
session.cookie_httponly = 1
session.cookie_samesite = Lax
